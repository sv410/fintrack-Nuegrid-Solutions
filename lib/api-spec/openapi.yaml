openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FinTrack Personal Finance Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
      description: Returns a list of transactions with optional filters
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [income, expense]
          description: Filter by type
        - name: startDate
          in: query
          required: false
          schema:
            type: string
          description: Filter from date (ISO 8601)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
          description: Filter to date (ISO 8601)
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}:
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/summary:
    get:
      operationId: getTransactionSummary
      tags: [transactions]
      summary: Get financial summary
      description: Returns total income, expense, net balance, and top spending category
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummary"

  /transactions/by-category:
    get:
      operationId: getSpendingByCategory
      tags: [transactions]
      summary: Get spending grouped by category
      description: Returns expense totals per category for chart rendering
      responses:
        "200":
          description: Category spending breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpending"

  /transactions/insight:
    get:
      operationId: getSpendingInsight
      tags: [transactions]
      summary: Get rule-based spending insight
      description: Returns a single insight derived from the user's spending patterns
      responses:
        "200":
          description: Spending insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingInsight"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Transaction:
      type: object
      required: [id, amount, category, type, date, createdAt]
      properties:
        id:
          type: integer
        amount:
          type: number
        category:
          type: string
        type:
          type: string
          enum: [income, expense]
        date:
          type: string
        note:
          type: ["string", "null"]
        createdAt:
          type: string

    TransactionInput:
      type: object
      required: [amount, category, type, date]
      properties:
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          minLength: 1
        type:
          type: string
          enum: [income, expense]
        date:
          type: string
          minLength: 1
        note:
          type: string

    FinancialSummary:
      type: object
      required: [totalIncome, totalExpense, netBalance, topCategory, transactionCount]
      properties:
        totalIncome:
          type: number
        totalExpense:
          type: number
        netBalance:
          type: number
        topCategory:
          type: ["string", "null"]
        transactionCount:
          type: integer

    CategorySpending:
      type: object
      required: [category, total, count]
      properties:
        category:
          type: string
        total:
          type: number
        count:
          type: integer

    SpendingInsight:
      type: object
      required: [type, message, detail]
      properties:
        type:
          type: string
          enum: [warning, positive, neutral, tip]
        message:
          type: string
        detail:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
